<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Corner Emulator Host</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #04070d;
      color: #f3e5bd;
      font-family: Segoe UI, sans-serif;
    }

    #emulator-root,
    #booting {
      width: 100%;
      height: 100%;
    }

    #emulator-root {
      overflow: hidden;
    }

    #emulator-root .ejs_menu_bar,
    #emulator-root .ejs_context_menu,
    #emulator-root .ejs_virtualGamepad_parent,
    #emulator-root .ejs_popup_container {
      display: none !important;
    }

    #emulator-root .ejs_canvas_parent,
    #emulator-root .ejs_canvas {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
    }

    #booting {
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .host-copy {
      max-width: 36rem;
      line-height: 1.5;
    }
  </style>
</head>

            stopStateCaptureLoop();
            logDebug('init-received', {
              romName: data.romName || 'Game Corner Expansion',
              hasIncomingSave: !!pendingSaveBuffer,
              hasIncomingState: !!pendingStateBuffer,
            });

            if (!pendingSaveBuffer && !pendingStateBuffer) {
              const bundledBootstrap = await loadBundledBootstrap();
              if (bundledBootstrap) {
                pendingSaveBuffer = bundledBootstrap.saveBuffer;
                pendingStateBuffer = bundledBootstrap.stateBuffer;
              }
            }

            window.EJS_player = '#emulator-root';
            window.EJS_core = data.core || 'gba';
            window.EJS_gameName = data.romName || 'Game Corner Expansion';
            window.EJS_gameUrl = romUrl;
            window.EJS_pathToData = data.dataPath || 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_pathtodata = window.EJS_pathToData;
            window.EJS_startOnLoaded = true;
            window.EJS_browserMode = window.matchMedia('(max-width: 860px)').matches ? 'mobile' : 'auto';
            window.EJS_ready = () => {
              logDebug('emulator-ready');
              if (!pendingStateBuffer && !bootstrapSaveFile()) {
                injectSaveFile();
              }
              startStateCaptureLoop();
              scheduleAutoContinue();
              send('ejs:ready');
            };
            window.EJS_onGameStart = () => {
              logDebug('game-started');
              if (!pendingStateBuffer && !bootstrapSaveFile()) {
                injectSaveFile();
              }
              startStateCaptureLoop();
              scheduleAutoContinue();
            };
            window.EJS_onSaveUpdate = (saveEvent) => {
              const buffer = cloneBuffer(saveEvent && saveEvent.save);
              if (!buffer) {
                send('ejs:save-update', { byteLength: 0, fileName: 'game-corner.sav' });
                return;
              }
              send(
                'ejs:save-update',
                {
                  byteLength: buffer.byteLength,
                  fileName: 'game-corner.sav',
                  saveBuffer: buffer,
                },
                [buffer],
              );
              captureAndEmitState('save-update');
            };

            const loader = document.createElement('script');
            loader.src = LOADER_SRC;
            loader.async = true;
            loader.onerror = () => send('ejs:error', { message: 'Failed to load EmulatorJS loader.' });
            document.body.appendChild(loader);
          } catch (error) {
            send('ejs:error', { message: error instanceof Error ? error.message : 'Unknown EmulatorJS host error.' });
          }
        })();
      });

      window.addEventListener('pagehide', () => {
        captureAndEmitState('pagehide');
      });
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          captureAndEmitState('visibilitychange');
        }
      });
      window.addEventListener('beforeunload', cleanup);
      send('ejs:host-ready');
    })();
  </script>
</body>
</html>
