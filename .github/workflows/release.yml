name: Release Tauri Desktop Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CARGO_INCREMENTAL: 0
      CARGO_BUILD_JOBS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Clean Rust build cache (Unix)
        if: runner.os != 'Windows'
        working-directory: tauri-app/src-tauri
        run: |
          cargo clean
          rm -rf target
      - name: Clean Rust build cache (Windows)
        if: runner.os == 'Windows'
        working-directory: tauri-app/src-tauri
        shell: pwsh
        run: |
          cargo clean
          if (Test-Path "target") { Remove-Item -Recurse -Force "target" }
      - name: Install dependencies
        working-directory: tauri-app
        run: npm install
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          tagName: ${{ github.ref_name }}
          releaseName: "Pokettrpg ${{ github.ref_name }}"
          releaseBody: "Automated release for ${{ github.ref_name }}"
          args: "--config src-tauri/tauri.conf.json"
