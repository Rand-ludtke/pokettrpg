name: Release Windows build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.5.1). Leave empty to use ref name.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build_windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tauri-app
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Enable Git LFS
        run: git lfs install

      - name: Pull LFS files
        run: git lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tauri-app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npx tauri build --bundles nsis

      - name: Upload Windows artifacts to GitHub Release (clobber)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = "$env:RELEASE_TAG".Trim()
          if (-not $tag) { $tag = "$env:GITHUB_REF_NAME" }
          if (-not $tag -and $env:GITHUB_REF) { $tag = $env:GITHUB_REF -replace '^refs/tags/', '' }
          if (-not $tag) { throw "Cannot determine tag name" }
          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) { gh release create $tag -t $tag -n "" }
          Get-ChildItem -LiteralPath "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -File | ForEach-Object {
            gh release upload $tag $_.FullName --clobber
          }

      - name: Upload artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: windows-dist
          path: tauri-app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
