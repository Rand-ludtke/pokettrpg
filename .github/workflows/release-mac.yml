name: Release macOS build (unsigned)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: tauri-app
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: brew install git-lfs && git lfs install

      - name: Pull LFS files
        run: git lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tauri-app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app (unsigned)
        env:
          APPLE_SIGNING_IDENTITY: '-'
        run: npx tauri build --bundles dmg

      - name: Upload macOS artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag="${GITHUB_REF_NAME}"
          if [ -z "$tag" ] && [ -n "$GITHUB_REF" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          fi
          [ -n "$tag" ] || { echo "Cannot determine tag"; exit 1; }
          gh release view "$tag" 2>/dev/null || gh release create "$tag" -t "$tag" -n ""
          for f in src-tauri/target/release/bundle/dmg/*.dmg; do
            [ -f "$f" ] && gh release upload "$tag" "$f" --clobber
          done

      - name: Upload artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: tauri-app/src-tauri/target/release/bundle/dmg/**
          if-no-files-found: ignore
