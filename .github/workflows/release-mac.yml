name: Release macOS build (Tauri)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag (e.g. v1.3.2)
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build_macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/src-tauri

      - name: Install dependencies
        working-directory: tauri-app
        run: npm install

      - name: Sync Sage dex data into app public assets
        working-directory: tauri-app
        run: npm run sync:sage-data

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri macOS (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
        with:
          projectPath: tauri-app
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: Pokettrpg ${{ steps.tag.outputs.tag }}
          releaseDraft: ${{ steps.tag.outputs.draft }}
          args: >
            --config src-tauri/tauri.conf.json
            --target universal-apple-darwin
            --bundles dmg
